<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form | Deb8er</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/form.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="icon" type="image/webp" href="assets/favicon1.png" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="logo">
        <h2>DEB<span>8ER</span>
        </h2>
      </a>
  
      <!-- Hamburger -->
      <div class="nav-toggle" id="navToggle">
        <i class="fa-solid fa-bars"></i>
      </div>
  
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="conferences.html">Conferences</a></li>
        <li><a href="verification.html">Verification</a></li>
        <li><a href="team.html">Team</a></li>
        <li><a href="form.html" class="join-btn">Join Us</a></li>
      </ul>
    </div>
  </nav>
  <section class="join-section" id="join">
    <h2 class="section-title">
      Join a <span class="span1">Deb</span><span class="span2">8</span>er MUN
    </h2>
  
    <!-- ================= EVENT TYPE SELECT ================= -->
    <div class="event-type-selector">
      <label class="event-option">
        <input type="radio" name="eventType" value="mun" checked>
        <span>MUN Conference</span>
      </label>
  
      <label class="event-option">
        <input type="radio" name="eventType" value="debate">
        <span>Debate Conference</span>
      </label>
    </div>
  
    <form class="join-form" id="munForm">
  
      <!-- Full Name -->
      <div class="form-group">
        <label>Full Legal Name</label>
        <input type="text" name="fullName" required placeholder="Your full legal name">
      </div>
  
      <!-- Nick Name -->
      <div class="form-group">
        <label>Nick Name</label>
        <input type="text" name="nickName" required placeholder="Name you would like to use (If none, fill in first name)">
      </div>
  
      <!-- Email -->
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
  
      <!-- Age -->
      <div class="form-group">
        <label>Age</label>
        <input type="number" name="age" min="10" max="99" required>
      </div>
  
      <!-- Country -->
      <div class="form-group">
        <label>Country</label>
        <input
          type="text"
          id="countryInput"
          list="countryList"
          name="country"
          placeholder="Start typing your residential country..."
          autocomplete="off"
          required
        />
        <datalist id="countryList"></datalist>
      </div>
  
      <!-- Timezone Message -->
      <div class="timezone-message" id="timezoneMessage"></div>
  
      <!-- ================= MUN ONLY ================= -->
  
      <!-- Preferred Country -->
      <div class="form-group mun-only">
        <label>Country You Prefer to Represent (Portfolio)</label>
        <input
          type="text"
          name="preferredCountry"
          placeholder="Country you want to represent (Portfolio)"
        >
      </div>
  
      <!-- Committee -->
      <div class="form-group committee-group mun-only">
        <label>
          Committee
          <span class="info-trigger">
            <i class="fas fa-info-circle"></i>
            <span class="tooltip-box">
              Although you select a committee, it is not guaranteed.
              This serves as practice for future MUNs and final allocations
              will be made later.
            </span>
          </span>
        </label>
  
        <select name="committee">
          <option value="">Select a committee</option>
          <option>UNGA</option>
          <option>UNSC</option>
          <option>WHO</option>
          <option>ECOSOC</option>
        </select>
      </div>
  
      <!-- ================= DEBATE ================= -->
  
      <!-- Debate Region -->
      <div class="form-group ">
        <label class="label-with-info">
          Debate Region
          <span class="info-trigger">
            <i class="fas fa-info-circle"></i>
            <span class="tooltip-box">
              You may still select other regions if you are available
              during their scheduled time.
            </span>
          </span>
        </label>
  
        <select id="debateRegion" name="debateRegion" required>
          <option value="">Select region</option>
          <option value="asia">Asian Debate</option>
          <option value="america">American Debate</option>
          <option value="europe">European Debate</option>
          <option value="africa">African Debate</option>
        </select>
      </div>
  
      <!-- Acknowledgement -->
      <div class="form-checkbox">
        <input type="checkbox" id="timezoneAgree" required>
        <label for="timezoneAgree">
          I understand this debate may take place outside of my local timezone and confirm this time works for me.
        </label>
      </div>
  
      <!-- Submit -->
      <button type="submit" class="join-btn full">
        Submit Application
      </button>
  
    </form>
  
    <!-- ================= SUBMISSION SUCCESS ================= -->
    <div class="form-success" id="formSuccess">
      <div class="success-card">
        <i class="fas fa-check-circle"></i>
        <h3>Application Submitted</h3>
        <p>
          Thank you for applying to <strong>Deb8er</strong>.
          Your application has been received and is under review.
        </p>
        <p class="success-sub">
          You’ll receive further instructions via email.
        </p>
  
        <a href="conferences.html" class="join-btn">
          View Conferences
        </a>
      </div>
    </div>
  </section>
  
      <script src="script.js"></script>
    <!-- Include D3.js -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<!-- Include TopoJSON for world map -->
<script src="https://d3js.org/topojson.v3.min.js"></script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<!-- Moment.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

<!-- Moment Timezone -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
  
    /* ================= EVENT TYPE TOGGLE ================= */
    const eventRadios = document.querySelectorAll('input[name="eventType"]');
    const munOnly = document.querySelectorAll(".mun-only");
    const debateOnly = document.querySelectorAll(".debate-only");
    const title = document.querySelector(".section-title");
  
    function updateEventType(type) {
      if (type === "mun") {
        munOnly.forEach(el => el.style.display = "block");
        debateOnly.forEach(el => el.style.display = "none");
        title.innerHTML = `Join a <span class="span1">Deb</span><span class="span2">8</span>er MUN`;
      } else {
        munOnly.forEach(el => el.style.display = "none");
        debateOnly.forEach(el => el.style.display = "block");
        title.innerHTML = `Join a <span class="span1">Deb</span><span class="span2">8</span>er Debate`;
      }
    }
  
    eventRadios.forEach(radio => {
      radio.addEventListener("change", () => {
        updateEventType(radio.value);
        // 🔥 Added as requested:
        regionAutoSet = false; 
        updateLocalTime();
      });
    });
  
    // Default
    updateEventType("mun");
  
    /* ================= CORE ELEMENTS ================= */
    const countryInput = document.getElementById("countryInput");
    const countryList = document.getElementById("countryList");
    const debateRegionSelect = document.getElementById("debateRegion");
    const timezoneMessage = document.getElementById("timezoneMessage");
    const form = document.getElementById("munForm");
    const successBox = document.getElementById("formSuccess");
  
    let countryMap = {};
    let regionAutoSet = false;
  
    /* ================= REGION TIME SLOTS ================= */
    const REGION_SLOTS = {
      mun: {
        asia: { 
          label: "Asia", 
          timezone: "Asia/Bangkok", 
          date: "2026-01-20", 
          start: "15:30", // MDT 02:30 AM
          end: "18:00" 
        },
        europe: { 
          label: "Europe", 
          timezone: "Europe/Paris", 
          date: "2026-01-20", 
          start: "16:00", // MDT 08:00 AM
          end: "21:00"    // MDT 01:00 PM
        },
        america: { 
          label: "Americas", 
          timezone: "America/New_York", 
          date: "2026-01-20", 
          start: "10:00", // MDT 08:00 AM
          end: "15:00"    // MDT 01:00 PM
        },
        africa: { 
          label: "Africa–Oceania", 
          timezone: "Africa/Johannesburg", 
          date: "2026-01-20", 
          start: "08:30", // MDT 12:30 AM (Jan 20)
          end: "11:00" 
        }
      },
    
      debate: {
        asia: { 
          label: "Asia", 
          timezone: "Asia/Bangkok", 
          date: "2026-02-15", 
          start: "16:00", // MDT 03:00 AM
          end: "18:00" 
        },
        europe: { 
          label: "Europe", 
          timezone: "Europe/Paris", 
          date: "2026-02-15", 
          start: "17:00", // MDT 09:00 AM
          end: "19:00" 
        },
        america: { 
          label: "Americas", 
          timezone: "America/New_York", 
          date: "2026-02-15", 
          start: "07:30", // MDT 05:30 AM
          end: "09:30" 
        },
        africa: { 
          label: "Africa–Oceania", 
          timezone: "Africa/Johannesburg", 
          date: "2026-02-15", 
          start: "07:30", // MDT 11:30 PM (Feb 14) -> Resulting in Feb 15 AM local
          end: "09:30" 
        }
      }
    };
  
    /* ================= AUTO REGION ================= */
    function autoSelectRegionByCountry(countryCode) {
      const zones = moment.tz.zonesForCountry(countryCode, true);
      if (!zones || zones.length === 0) return;
  
      const tz = zones[0].name;
      let suggested = "asia";
  
      if (tz.startsWith("Europe")) suggested = "europe";
      else if (tz.startsWith("America")) suggested = "america";
      else if (tz.startsWith("Africa")) suggested = "africa";
  
      if (!regionAutoSet) {
        debateRegionSelect.value = suggested;
        regionAutoSet = true;
      }
    }
  
    /* ================= FETCH COUNTRIES ================= */
    fetch("https://restcountries.com/v3.1/all?fields=name,cca2")
      .then(res => res.json())
      .then(data => {
        data.sort((a, b) => a.name.common.localeCompare(b.name.common));
        data.forEach(c => {
          countryMap[c.name.common] = c.cca2;
          const opt = document.createElement("option");
          opt.value = c.name.common;
          countryList.appendChild(opt);
        });
      });
  
    /* ================= TIME DISPLAY ================= */
    function updateLocalTime() {
      const countryName = countryInput.value.trim();
      const regionKey = debateRegionSelect.value;
      const eventType = document.querySelector('input[name="eventType"]:checked')?.value || "mun";
    
      if (!countryMap[countryName] || !REGION_SLOTS[eventType] || !REGION_SLOTS[eventType][regionKey]) {
        timezoneMessage.style.display = "none";
        return;
      }
    
      const userZones = moment.tz.zonesForCountry(countryMap[countryName], true);
      if (!userZones || userZones.length === 0) return;
    
      const userTZ = userZones[0].name;
      const region = REGION_SLOTS[eventType][regionKey];
    
      const start = moment.tz(`${region.date} ${region.start}`, "YYYY-MM-DD HH:mm", region.timezone);
      const end = moment.tz(`${region.date} ${region.end}`, "YYYY-MM-DD HH:mm", region.timezone);
    
      timezoneMessage.innerHTML = `
        <strong>${region.label} ${eventType.toUpperCase()} Session</strong><br>
        Official time: ${start.format("MMMM D, YYYY HH:mm")} – ${end.format("HH:mm")} (${region.timezone})<br>
        <span style="color:#22d3ee;">
          Your local time: ${start.clone().tz(userTZ).format("MMMM D, YYYY HH:mm")}
          – ${end.clone().tz(userTZ).format("HH:mm")} (${userTZ})
        </span>
      `;
    
      timezoneMessage.style.display = "block";
    }
  
    countryInput.addEventListener("input", () => {
      const code = countryMap[countryInput.value.trim()];
      if (!code) return;
      autoSelectRegionByCountry(code);
      updateLocalTime();
    });
  
    debateRegionSelect.addEventListener("change", () => {
      regionAutoSet = true;
      updateLocalTime();
    });
  
    /* ================= FORM SUBMISSION ================= */
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzh_K7JX0n8EoYUz9Hg0cZpyDGO-nGBo4pzLQU6B3P1PmZ9q3TYeJq76a1K-eENpPMP/exec";
  
    form.addEventListener("submit", (e) => {
      e.preventDefault();
  
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.innerText = "Submitting...";
      submitBtn.disabled = true;
  
      const eventType = document.querySelector('input[name="eventType"]:checked')?.value || "mun";
  
      const formData = new URLSearchParams();
      formData.append("eventType", eventType);
      formData.append("fullName", form.elements["fullName"].value);
      formData.append("nickName", form.elements["nickName"].value);
      formData.append("email", form.elements["email"].value);
      formData.append("age", form.elements["age"].value);
      formData.append("country", countryInput.value);
      formData.append("debateRegion", debateRegionSelect.value);
  
      if (eventType === "mun") {
        formData.append("preferredCountry", form.elements["preferredCountry"].value);
        formData.append("committee", form.elements["committee"].value);
      }
  
      fetch(GOOGLE_SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData.toString()
      })
      .then(() => {
        form.style.display = "none";
        successBox.style.display = "block";
        successBox.scrollIntoView({ behavior: "smooth" });
      })
      .catch(() => {
        alert("Submission failed. Try again.");
        submitBtn.innerText = "Submit";
        submitBtn.disabled = false;
      });
    });
  });
</script>
  
  
</body>
</html>
